<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal stylesheet </title>

    <style>
        h1 {
            color: red;
            font-size: 60px;
            font-family: sans-serif;
            text-align: center;
        }

        body {
            background-color: green;
        }

        div {
            width: 1200px;
            height: 200px;
            background-color: white;
        }

        button {
            background-color: black;
            border: none;
            color: white;
            width: 180px;
            height: 60px;
            font-size: 20px;
        }

        nav {
            width: 1200px;
            background-color: yellow;
            height: 50px;
            font-size: 35px;
            font-family: calibri;
            font-weight: bold;
        }

        input{
            width: 1200px;
            height: 50px;
            font-size: 20px;
            text-align: center;
        }
    </style>

</head>

<body>
    <!-- 
    <h1>This is heading one</h1>
    <h1>This is another heading here </h1> -->

    <center>
        <div>
            <h1>This is simple heading tag </h1>
            <button>Home</button>
            <button>Images</button>
            <button>Videos</button>
            <button>Contact</button>
            <button>About </button>
        </div>
        <nav>
            This is css tutorial for basic lerner
        </nav>
        <form action="">
            <input type="search" name="search" placeholder="search products from here " />
        </form>
    </center>


</body>

</html>
