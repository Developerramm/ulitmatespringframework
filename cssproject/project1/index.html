<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>web designing</title>
    <style>
        header {
            width: 100%;
            height: 50px;
            /* border: 1px solid red; */
            float: left;
            box-sizing: border-box;
            padding: 6px;
        }

        body {
            padding: 0;
            margin: 0;
        }

        #brand_name {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            float: left;
            margin-left: 24px;
        }

        #tag_line {
            float: right;
            margin: 0;
            padding: 0;
            margin-top: 10px;
            font-family: century gothic;
            margin-right: 24px;
        }

        nav {
            width: 100%;
            height: 106px;
            background-color: blue;
            float: left;
            box-sizing: border-box;
            padding: 30px;
        }

        #search {
            width: 400px;
            height: 40px;
            float: left;
            box-sizing: border-box;
            border: none;
            font-size: 16px;
            padding: 10px;
        }

        #search_btn {
            width: 100px;
            height: 40px;
            float: left;
            box-sizing: border-box;
            border: none;
            margin-left: 3px;
            font-size: 16px;
        }

        #menu_table {
            width: 600px;
            height: 40px;
            float: right;
            box-sizing: border-box;
        }

        .menu_item {
            background-color: white;
            text-align: center;
            width: 20%;
        }

        a {
            text-decoration: none;
            color: black;
            font-family: sans-serif;
        }

        section {
            width: 100%;
            height: 1200px;
            box-sizing: border-box;
            float: left;
            border: 1px solid blue;
            padding: 30px;
        }

        #venue {
            float: left;
        }

        #phone {
            float: right;
        }

        #popular_sweets_box {
            width: 720px;
            height: 550px;
            float: left;
            box-sizing: border-box;
            background-color: black;
            margin-top: 30px;
            padding: 10px;
        }

        #popular_sweets_title {
            color: white;
            text-align: center;
            font-size: 30px;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
        }

        #popular_sweet_images{
            width: 300px;
            height: 200px;
            box-sizing: border-box;
            margin: 15px;
            border: 1px solid white;
            border-radius: 5px;
        }

        #rate_list_box{
            width: 400px;
            height: 550px;
            float: right;
            box-sizing: border-box;
            border: 1px solid black;
        }


    </style>
</head>

<body>

    <header>
        <h1 id="brand_name">Sweetshop.com</h1>
        <p id="tag_line">The world's largest sweeps & bakery shop </p>
    </header>
    <nav>
        <form action="">
            <input id="search" type="search" name="search" placeholder="search your sweets here ">
            <input id="search_btn" type="submit" value="Search">
        </form>

        <table id="menu_table">
            <tr>
                <td class="menu_item"><a href="#">Home</a></td>
                <td class="menu_item"><a href="#">Sweets</a></td>
                <td class="menu_item"><a href="#">About Us</a></td>
                <td class="menu_item"><a href="#">Contact Us</a></td>
                <td class="menu_item"><a href="#">Blogs</a></td>
            </tr>
        </table>
    </nav>
    <section>

        <address id="venue">
            Venue : Patel Nagar, New Delhi - 110008
        </address>

        <address id="phone">
            Order online : +91 8888888880
        </address>

        <div id="popular_sweets_box">
            <h1 id="popular_sweets_title">Our Popular Sweets </h1>
            <img src="/images/1.jpg" alt="a" id="popular_sweet_images" />
            <img src="/images/2.png" alt="2" id="popular_sweet_images" />
            <img src="/images/3.jpg" alt="3" id="popular_sweet_images" />
            <img src="/images/4.jpg" alt="4" id="popular_sweet_images" />
        </div>

        <table id="rate_list_box">
            <tr>
                <td></td>
                <td></td>
            </tr>
            <tr></tr>
        </table>

    </section>
    <footer></footer>

</body>

</html>
