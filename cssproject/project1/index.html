<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>web designing</title>
    <style>
        header {
            width: 100%;
            height: 50px;
            /* border: 1px solid red; */
            float: left;
            box-sizing: border-box;
            padding: 6px;
        }

        body {
            margin: 0;
            padding: 0;
        }

        #brand {
            margin: 0;
            padding: 0;
            float: left;
            font-family: sans-serif;
        }

        #tag_line {
            float: right;
            margin: 0;
            padding: 0;
            margin-top: 10px;
            font-family: century gothic;
        }

        nav {
            width: 100%;
            height: 106px;
            background-color: blue;
            float: left;
            box-sizing: border-box;
            padding: 30px;
        }

        #search {
            width: 400px;
            height: 40px;
            float: left;
            box-sizing: border-box;
            border: none;
            font-size: 16px;
            padding: 10px;
        }

        #search_btn {
            width: 100px;
            height: 40px;
            float: left;
            box-sizing: border-box;
            border: none;
            margin-left: 3px;
            font-size: 16px;
        }

        #menu_table {
            width: 600px;
            height: 40px;
            float: right;
            box-sizing: border-box;

        }

        #menu_item {
            background-color: white;
            width: 20%;
            text-align: center;
        }

        a {
            text-decoration: none;
            color: black;
            font-family: sans-serif;
        }

        section {
            width: 100%;
            height: 1200px;
            float: left;
            box-sizing: border-box;
            border: 1px solid red;
            padding: 30px;
        }

        #venue {
            float: left;
        }

        #phone {
            float: right;
        }

        #popular_sweets_box {
            width: 720px;
            height: 550px;
            float: left;
            box-sizing: border-box;
            background-color: black;
            margin-top: 30px;
            padding: 25px;
        }

        #popular_sweets_title {
            color: white;
            text-align: center;
            font-size: 30px;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
        }

        #popular_sweet_img{
            width: 300px;
            height: 200px;
            margin: 15px;
            border: 5px solid white;
            box-sizing: border-box;
        }


    </style>
</head>

<body>

    <header>
        <h1 id="brand">Sweetshop.com</h1>
        <p id="tag_line">The world's largest Sweets & bakeris shop</p>
    </header>

    <nav>
        <form action="">
            <input id="search" type="search" name="search" placeholder="search your sweets here">
            <input type="submit" value="search" id="search_btn">
        </form>

        <table id="menu_table">
            <tr>
                <td id="menu_item"><a href="#">Home</a></td>
                <td id="menu_item"><a href="#">Sweets</a></td>
                <td id="menu_item"><a href="#">Bakeries</a></td>
                <td id="menu_item"><a href="#">About Us</a></td>
                <td id="menu_item"><a href="#">Contact Us</a></td>

            </tr>
        </table>
    </nav>

    <section>

        <address id="venue">
            Venue : Noida NCR , New Delhi - 110004
        </address>

        <address id="phone">Order Online : +91 8956321450, +91 8877995600</address>

        <div id="popular_sweets_box">
            <h1 id="popular_sweets_title">Our Popular Sweets</h1>

            <img src="/images/a.jpg" alt="a" id="popular_sweet_img" />
            <img src="/images/b.jpg" alt="b" id="popular_sweet_img" />
            <img src="/images/c.jpg" alt="c" id="popular_sweet_img" />
            <img src="/images/d.jpg" alt="d" id="popular_sweet_img" />

        </div>

    </section>

    <footer></footer>

</body>

</html>
